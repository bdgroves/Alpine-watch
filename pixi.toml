[project]
name = "alpine-watch"
version = "0.1.0"
description = "Alpine Lake Clarity Monitor — Sierra Nevada & Cascades"
authors = ["Brooks Groves <bdgroves@github>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
requests = ">=2.31"
pandas = ">=2.1"
numpy = ">=1.26"
matplotlib = ">=3.8"
scipy = ">=1.11"
pillow = ">=10.0"
python-dateutil = ">=2.8"
dataretrieval = ">=1.0"

[tasks]
fetch = "python scripts/fetch_lakes.py"
render = "python scripts/render_charts.py"
build = { depends-on = ["fetch", "render"] }
